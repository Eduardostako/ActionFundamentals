name: GitHub Actions Demo

on: 
  push: 
    branches: main
    paths-ignore:
      - .github/**
  pull_request: 
    branches: main
  schedule:
    - cron: '15 6 * * 0'
  workflow_dispatch:

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - name: Test Event
        run: |
          echo '${{ github.event_name}}'
          echo '${{ github.ref }}'
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: List files
        run: ls -l
  

  
